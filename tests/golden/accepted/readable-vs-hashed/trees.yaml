            <svg xmlns="http://www.w3.org/2000/svg" style="display: none">
          <!-- KPress icon set. Lucide Icons v1.17.0 (ISC, https://lucide.dev): stroke icons on a
               24x24 grid. This sprite is the single source of truth for KPress chrome glyphs. The
               server inlines it once per document; server-render and client JS then reference a
               symbol via <svg><use href="#kpress-icon-<name>"></svg> (fragment-only -- external
               file refs render blank in headless Chromium and some CSP/sandbox setups). Color comes
               from CSS `color` (stroke="currentColor"); size comes from the referencing <svg>. To
               add or swap a glyph, edit this file -- no SVG lives in Python or JS. See
               kpress-icons.md. -->
          <symbol id="kpress-icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/>
            <circle cx="12" cy="12" r="3"/>
