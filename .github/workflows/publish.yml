name: Publish to PyPI

on:
  release:
    types: [published]

env:
  # Supply-chain cool-off: only consider releases older than this, so the publish
  # build never resolves packages too new to have been vetted. uv (>= 0.9, and the
  # version pinned below) accepts a relative duration directly. See the Supply Chain
  # Hardening section in docs/development.md.
  UV_EXCLUDE_NEWER: "14 days"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Mandatory for OIDC.
      contents: read
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          # Important for versioning plugins:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv (official Astral action)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.25"
          checksum: "1db18b5e76fa645a7f3865773139bdec8e2d46adbdbb35e7410b34fa8015ccd2"
          enable-cache: true
          python-version: "3.13"

      - name: Set up Python (using uv)
        run: uv python install

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: "npm"

      - name: Run the complete release gate
        run: make verify

      - name: Verify release tag and package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'Refusing to publish non-release tag: %s\n' "$RELEASE_TAG" >&2
            exit 1
          fi
          expected="${RELEASE_TAG#v}"
          actual="$(uv run python -c 'import kpress; print(kpress.__version__)')"
          if [ "$actual" != "$expected" ]; then
            printf 'Release version mismatch: expected %s from tag %s, got %s\n' \
              "$expected" "$RELEASE_TAG" "$actual" >&2
            exit 1
          fi

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
