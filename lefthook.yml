# Git hooks managed by lefthook (https://lefthook.dev).
# Install once: `make hooks-install`.
# Bypass for an emergency commit: `git commit --no-verify` (avoid in PRs).

# Run pre-commit commands sequentially (not parallel). Several commands stage
# fixups with `git add` (stage_fixed), and concurrent `git add` contends on
# .git/index.lock; sequential execution removes that race. The fast ruff/biome
# steps add almost nothing to the dominant format-markdown (flowmark) runtime.
pre-commit:
  parallel: false
  commands:
    ruff-format:
      glob: "*.py"
      run: uv --config-file uv.toml run --frozen ruff format {staged_files}
      stage_fixed: true

    ruff-check:
      glob: "*.py"
      run: uv --config-file uv.toml run --frozen ruff check --fix {staged_files}
      stage_fixed: true

    # --unsafe auto-applies Biome's unsafe-class fixes (e.g. brace wrapping);
    # CI stays verify-only via `biome ci` in `devtools.lint`.
    # --no-errors-on-unmatched so staging only biome-ignored vendored assets
    # (e.g. katex/*.min.css) does not fail the commit.
    biome:
      glob: "*.{js,css,json}"
      run: make biome-fix STAGED_FILES="{staged_files}"
      stage_fixed: true

    browser-types:
      glob: "*.js"
      run: make browser-types

    # NOTE: when files are passed as explicit args, codespell bypasses the
    # [tool.codespell] skip list in pyproject.toml, so the skip patterns must
    # be repeated here — keep the two in sync.
    codespell:
      glob: "*.{py,md}"
      run: uv --config-file uv.toml run --frozen codespell --write-changes --skip='tests/fixtures/*,tests/golden/accepted/*,tests/e2e/docs/*,*/static/katex/*,*/static/icons/*' {staged_files}
      stage_fixed: true

    # Markdown formatting with flowmark-rs. Whole-repo, not {staged_files}:
    # flowmark-rs only reads .flowmarkignore relative to its target arg, so
    # passing subsets bypasses the exclusion list and damages fixtures and
    # e2e showcase docs. The `glob: '*.md'` filter just means the hook only
    # fires when at least one staged file is Markdown; the whole-tree scan is
    # fast (well under a second).
    format-markdown:
      glob: "*.md"
      run: make format-markdown
      stage_fixed: true

pre-push:
  commands:
    quality:
      run: make lint-check test
